# netlify.toml

[build]
base = "frontend"
  command = "npm run build"
  publish = "dist"

# Redirect API calls to your backend server
[[redirects]]
  from = "/api/*"
  to = "http://localhost:8000/api/:splat"
  status = 200
  force = true

# Optional: handle SPA routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
