[build]
  base = "frontend/ai-learning-assistant"
  command = "npm run build"
  publish = "dist"

# Redirect API calls to your backend server
[[redirects]]
  from = "/api/*"
  to = "https://ai-learning-assistant-edz7.onrender.com/api/:splat"
  status = 200
  force = true

# Optional: handle SPA routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
